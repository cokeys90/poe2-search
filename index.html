<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // 첫 페인트 전에 테마 적용 (깜빡임 방지). 저장값 없으면 시스템 설정 따름.
      (function () {
        try {
          var t = localStorage.getItem("poe2-search:theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- 검색 노출용 메타. 구글은 keywords 메타를 무시하므로 title/description/본문이 실제로 중요하다.
         ⚠️ 이 블록은 언어별로 통째로 갈아끼워진다 (scripts/build-html.mjs + scripts/data/seo.json).
            여기 있는 건 기본 언어(한국어, 루트 경로)의 것이다. 마커를 지우지 말 것.
            앱 안에서 t()로 바꿔서는 소용없다 — 크롤러는 JS를 돌리기 전의 <head>를 본다. -->
    <!--SEO-->
    <title>PoE2 경로석·서판 검색기 — 정규식 자동 생성 | 디바인 추룹</title>

    />

    <!-- 카카오톡·디스코드 등에 링크를 붙였을 때 보이는 미리보기 -->
    <meta property="og:type" content="website" />

    />
    <meta property="og:image" content="https://poe2.cokeys90.dev/favicon.png" />
    <meta name="twitter:card" content="summary" />
